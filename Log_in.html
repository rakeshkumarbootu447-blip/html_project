<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
</head>
<body>
    <form  action="http://127.0.0.1:5500/mini_project.html"  autocapitalize="off">
        <h1 style="text-align: center;" > LOG IN PAGE</h1>

        <fieldset>
            <legend>LOGIN</legend>

            <center>
                <label for="text">USERNAME:</label>
                <input type="text" name="name" placeholder="enter username" required autocomplete="off"> <br><br>

                <label for="password">PASSWORD:</label>
                <input type="password"  id="password" placeholder="enter password" required autocomplete="off">
                <br><br>  

                <label for="moblie">MOBILE NUMBER:</label>
                <input type="tel" id="moblie" placeholder="enter moblie number" pattern="[0-9]{10}" required>
                <br><br>

                <input type="submit" value="Login">


            </center>
        </fieldset>
    </form>
    
</body>
</html>
